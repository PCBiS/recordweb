services:
  recordweb:
    build:
      context: .
    image: recordweb:1.2.9-local
    container_name: recordweb
    init: true
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul
    ports:
      - "${RECORDWEB_PORT:-5000}:5000"
    volumes:
      - ./data/json:/app/json
      - ./recordings:/recordings
